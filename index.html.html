<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul Lengkap Mandarin - 100+ Karakter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }
        
        .content {
            padding: 40px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: white;
            padding: 20px 0;
            z-index: 100;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-btn {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .tab-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes highlight {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.05); }
            50% { transform: scale(1); }
            75% { transform: scale(1.05); }
        }
        
        .category-header {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .category-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .character-card {
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .character-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        
        .character-display {
            font-size: 4em;
            color: #333;
            margin: 15px 0;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            font-weight: bold;
        }
        
        .character-pinyin {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .character-meaning {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 12px;
        }
        
        .mnemonic-box {
            background: #fff9e6;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: left;
            border-left: 3px solid #ffd700;
        }
        
        .mnemonic-label {
            font-weight: bold;
            color: #ff6b6b;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .mnemonic-text {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        .stroke-count {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: #666;
            margin-top: 10px;
        }
        
        .component-box {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: left;
            border-left: 4px solid #4a90e2;
        }
        
        .component-label {
            font-weight: bold;
            color: #4a90e2;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .component-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .component-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #e0e0e0;
        }
        
        .component-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
            border-color: #4a90e2;
        }
        
        .component-char {
            font-size: 1.8em;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            color: #333;
            font-weight: bold;
        }
        
        .component-info {
            display: flex;
            flex-direction: column;
        }
        
        .component-pinyin {
            font-size: 0.85em;
            color: #667eea;
            font-weight: bold;
        }
        
        .component-meaning {
            font-size: 0.8em;
            color: #666;
        }
        
        .plus-sign {
            font-size: 1.2em;
            color: #999;
            margin: 0 5px;
        }
        
        .component-formula {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .pronunciation-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            font-weight: bold;
            width: 100%;
        }
        
        .pronunciation-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(250, 112, 154, 0.4);
        }
        
        .practice-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .practice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .practice-btn:active, .pronunciation-btn:active {
            transform: scale(0.98);
        }
        
        /* Hover effects untuk tombol navigasi di practice */
        button[onclick="goBack()"]:hover,
        button[onclick="previousCharacter()"]:hover,
        button[onclick="nextCharacter()"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        button[onclick="goBack()"]:active,
        button[onclick="previousCharacter()"]:active,
        button[onclick="nextCharacter()"]:active {
            transform: translateY(0);
        }
        
        .search-box {
            margin: 20px 0;
            text-align: center;
        }
        
        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .practice-section {
            background: #f8f9ff;
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            border: 3px solid #667eea;
        }
        
        .selected-char-display {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .selected-char {
            font-size: 6em;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            color: #333;
            margin: 10px 0;
        }
        
        .big-audio-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .canvas-wrapper {
            position: relative;
            display: inline-block;
            background: repeating-linear-gradient(
                0deg,
                #f5f5f5 0px,
                #f5f5f5 1px,
                transparent 1px,
                transparent 60px
            ),
            repeating-linear-gradient(
                90deg,
                #f5f5f5 0px,
                #f5f5f5 1px,
                transparent 1px,
                transparent 60px
            );
        }
        
        #practiceCanvas {
            border: 2px solid #ddd;
            cursor: crosshair;
            display: block;
            border-radius: 10px;
        }
        
        .reference-character {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 280px;
            color: rgba(102, 126, 234, 0.12);
            pointer-events: none;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            font-weight: bold;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .evaluate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 35px;
            font-size: 1.2em;
        }
        
        .evaluation-panel {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
        }
        
        .evaluation-panel.show {
            display: block;
            animation: slideIn 0.5s;
        }
        
        .score-display {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .score-number {
            font-size: 5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .character-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Modul Lengkap Mandarin</h1>
            <p>270+ Karakter + 60+ Kata dengan Mnemonic & Audio</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">270+</div>
                    <div class="stat-label">Karakter</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">60+</div>
                    <div class="stat-label">Kata-Kata</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">🔊</div>
                    <div class="stat-label">Audio</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">💡</div>
                    <div class="stat-label">Mnemonic</div>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cari karakter...">
            </div>
            
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="showTab('numbers', this)">🔢 Angka</button>
                <button class="tab-btn" onclick="showTab('people', this)">👥 Orang</button>
                <button class="tab-btn" onclick="showTab('family', this)">👨‍👩‍👧 Keluarga</button>
                <button class="tab-btn" onclick="showTab('body', this)">👁️ Tubuh</button>
                <button class="tab-btn" onclick="showTab('nature', this)">🌳 Alam</button>
                <button class="tab-btn" onclick="showTab('animals', this)">🐾 Hewan</button>
                <button class="tab-btn" onclick="showTab('food', this)">🍜 Makanan</button>
                <button class="tab-btn" onclick="showTab('directions', this)">🧭 Arah</button>
                <button class="tab-btn" onclick="showTab('time', this)">⏰ Waktu</button>
                <button class="tab-btn" onclick="showTab('colors', this)">🎨 Warna</button>
                <button class="tab-btn" onclick="showTab('adjectives', this)">📏 Sifat</button>
                <button class="tab-btn" onclick="showTab('verbs', this)">⚡ Kata Kerja</button>
                <button class="tab-btn" onclick="showTab('places', this)">🏛️ Tempat</button>
                <button class="tab-btn" onclick="showTab('common_chars', this)">📖 Karakter Umum</button>
                <button class="tab-btn" onclick="showTab('radicals', this)">🔠 Radikal & Dasar</button>
                <button class="tab-btn" onclick="showTab('words', this)">📝 Kata-Kata</button>
                <button class="tab-btn" onclick="showTab('practice', this)">✍️ Latihan</button>
            </div>
            
            <div id="numbers" class="tab-content active"></div>
            <div id="people" class="tab-content"></div>
            <div id="family" class="tab-content"></div>
            <div id="body" class="tab-content"></div>
            <div id="nature" class="tab-content"></div>
            <div id="animals" class="tab-content"></div>
            <div id="food" class="tab-content"></div>
            <div id="directions" class="tab-content"></div>
            <div id="time" class="tab-content"></div>
            <div id="colors" class="tab-content"></div>
            <div id="adjectives" class="tab-content"></div>
            <div id="verbs" class="tab-content"></div>
            <div id="places" class="tab-content"></div>
            <div id="common_chars" class="tab-content"></div>
            <div id="radicals" class="tab-content"></div>
            <div id="words" class="tab-content"></div>
            
            <div id="practice" class="tab-content">
                <div class="practice-section">
                    <!-- Tombol Navigasi -->
                    <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap;">
                        <button onclick="goBack()" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1em; transition: all 0.3s; box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);">
                            ← Kembali
                        </button>
                        <button onclick="previousCharacter()" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1em; transition: all 0.3s; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);">
                            ◄ Previous
                        </button>
                        <button onclick="nextCharacter()" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1em; transition: all 0.3s; box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);">
                            Next ►
                        </button>
                    </div>
                    
                    <div class="selected-char-display">
                        <div class="selected-char" id="bigCharDisplay">一</div>
                        <div style="font-size: 1.8em; color: #666;" id="charInfo">yī - satu</div>
                        <div id="practiceMnemonic" style="background: white; padding: 15px; border-radius: 10px; margin: 15px auto; max-width: 500px; text-align: left;"></div>
                        <button class="big-audio-btn" onclick="speakCurrentChar()">🔊 Dengar</button>
                    </div>
                    
                    <div style="background: white; border-radius: 15px; padding: 20px;">
                        <div class="canvas-wrapper">
                            <canvas id="practiceCanvas" width="600" height="600"></canvas>
                            <div class="reference-character" id="referenceChar">一</div>
                        </div>
                        
                        <div class="controls">
                            <button onclick="clearCanvas()">🗑️ Hapus</button>
                            <button onclick="toggleReference()">👁️ Panduan</button>
                            <button id="thinBtn" onclick="changeBrushSize(2)" style="border: 2px solid transparent;">✏️ Tipis (2px)</button>
                            <button id="mediumBtn" onclick="changeBrushSize(5)" style="border: 2px solid #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);">✏️ Sedang (5px)</button>
                            <button id="thickBtn" onclick="changeBrushSize(10)" style="border: 2px solid transparent;">✏️ Tebal (10px)</button>
                            <button class="evaluate-btn" onclick="evaluateWriting()">⭐ Nilai</button>
                        </div>
                        
                        <div style="text-align: center; margin-top: 15px; padding: 10px; background: #f8f9ff; border-radius: 10px;">
                            <div style="font-weight: bold; color: #667eea; margin-bottom: 10px;">Preview Ketebalan:</div>
                            <canvas id="brushPreview" width="300" height="60" style="border: 1px solid #ddd; border-radius: 5px;"></canvas>
                        </div>
                    </div>
                    
                    <div class="evaluation-panel" id="evaluationPanel">
                        <h3 style="text-align: center; font-size: 1.8em; margin-bottom: 20px;">📊 Hasil Penilaian</h3>
                        <div class="score-display">
                            <div class="score-number" id="totalScore">0</div>
                            <div style="font-size: 1.5em; color: #666;">dari 100</div>
                            <div style="font-size: 2.5em; margin: 15px 0;" id="scoreStars">⭐⭐⭐⭐⭐</div>
                            <div style="font-size: 1.3em; color: #667eea; font-weight: bold;" id="scoreVerdict">Sempurna!</div>
                        </div>
                        <div style="text-align: center;">
                            <button class="evaluate-btn" onclick="closeEvaluation()">Tutup & Coba Lagi</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const charactersData = {
            numbers: [
                {char: '零', pinyin: 'líng', meaning: 'Nol', strokes: 13, mnemonic: '雨 (hujan) + 令 = tetesan hujan yang jatuh sedikit-sedikit hingga nol'},
                {char: '一', pinyin: 'yī', meaning: 'Satu', strokes: 1, mnemonic: 'Satu garis horizontal = angka 1, paling sederhana!'},
                {char: '二', pinyin: 'èr', meaning: 'Dua', strokes: 2, mnemonic: 'Dua garis horizontal = angka 2'},
                {char: '三', pinyin: 'sān', meaning: 'Tiga', strokes: 3, mnemonic: 'Tiga garis horizontal = angka 3, mudah!'},
                {char: '四', pinyin: 'sì', meaning: 'Empat', strokes: 5, mnemonic: 'Seperti kotak dengan kaki (口 + 儿)'},
                {char: '五', pinyin: 'wǔ', meaning: 'Lima', strokes: 4, mnemonic: 'Seperti angka 5 romawi (V) dengan garis atas'},
                {char: '六', pinyin: 'liù', meaning: 'Enam', strokes: 4, mnemonic: 'Atap (⼌) + orang (八) = 6 orang di bawah atap'},
                {char: '七', pinyin: 'qī', meaning: 'Tujuh', strokes: 2, mnemonic: 'Seperti angka 7 yang dipotong'},
                {char: '八', pinyin: 'bā', meaning: 'Delapan', strokes: 2, mnemonic: 'Dua garis menyebar = membagi jadi 8'},
                {char: '九', pinyin: 'jiǔ', meaning: 'Sembilan', strokes: 2, mnemonic: 'Siku bengkok = hampir 10 (完整)'},
                {char: '十', pinyin: 'shí', meaning: 'Sepuluh', strokes: 2, mnemonic: 'Plus (+) = sempurna, lengkap 10'},
                {char: '百', pinyin: 'bǎi', meaning: 'Seratus', strokes: 6, mnemonic: 'Satu (一) + putih (白) = 100, angka putih/bersih'},
                {char: '千', pinyin: 'qiān', meaning: 'Seribu', strokes: 3, mnemonic: 'Orang (人) + sepuluh (十) = 1000, banyak!'},
                {char: '万', pinyin: 'wàn', meaning: 'Sepuluh Ribu', strokes: 3, mnemonic: 'Seperti sayap terbang tinggi = angka besar'}
            ],
            
            people: [
                {char: '人', pinyin: 'rén', meaning: 'Orang', strokes: 2, mnemonic: 'Orang berdiri dengan dua kaki'},
                {char: '我', pinyin: 'wǒ', meaning: 'Saya', strokes: 7, mnemonic: 'Tangan (手) + tombak (戈) = Saya yang bersenjata'},
                {char: '你', pinyin: 'nǐ', meaning: 'Kamu', strokes: 7, mnemonic: 'Orang (亻) + pergi (尔) = Kamu yang pergi'},
                {char: '他', pinyin: 'tā', meaning: 'Dia (L)', strokes: 5, mnemonic: 'Orang (亻) + juga (也) = Dia juga'},
                {char: '她', pinyin: 'tā', meaning: 'Dia (P)', strokes: 6, mnemonic: 'Perempuan (女) + juga (也) = Dia perempuan'},

            Object.keys(charactersData).forEach(category => {
                if (category === 'words' || category === 'radicals_additional') return;
                
                let dataToSearch = charactersData[category];
                
                // Untuk radicals, gabungkan dengan radicals_additional
                if (category === 'radicals' && charactersData.radicals_additional) {
                    dataToSearch = [...charactersData.radicals, ...charactersData.radicals_additional];
                }
                
                const item = dataToSearch.find(c => c.char === char);
                if (item) {
                    found = true;
                    
                    // Switch ke tab kategori yang sesuai
                    const tabMap = {
                        'numbers': 'numbers',
                        'people': 'people',
                        'family': 'family',
                        'body': 'body',
                        'nature': 'nature',
                        'animals': 'animals',
                        'food': 'food',
                        'directions': 'directions',
                        'time': 'time',
                        'colors': 'colors',
                        'adjectives': 'adjectives',
                        'verbs': 'verbs',
                        'places': 'places',
                        'common_chars': 'common_chars',
                        'radicals': 'radicals'
                    };
                    
                    const tabButton = document.querySelector(`.tab-btn[onclick*="${tabMap[category]}"]`);
                    if (tabButton) {
                        tabButton.click();
                    }
                    
                    // Tunggu tab terbuka, lalu scroll ke karakter
                    setTimeout(() => {
                        const cards = document.querySelectorAll('.character-card');
                        cards.forEach(card => {
                            if (card.dataset.char === char) {
                                card.style.animation = 'highlight 2s';
                                card.scrollIntoView({ behavior: 'smooth', block: 'center' });

                                    card.style.border = '2px solid #e0e0e0';
                                    card.style.boxShadow = '';
                                }, 2000);
                            }
                        });

                }
            });

                alert(`Karakter "${char}" belum ada dalam database karakter tunggal.`);

            if (activeTab && activeTab.id !== 'practice') {

            // Build array semua karakter dari tab saat ini untuk navigasi
            buildCharacterList();
            
            // Set karakter yang dipilih untuk latihan
            selectCharacter(char, pinyin, meaning, mnemonic);
            
            // Cari index karakter saat ini
            currentCharIndex = allCharacters.findIndex(c => c.char === char);
            
            // Switch ke tab practice
            const practiceTab = document.querySelector('.tab-btn[onclick*="practice"]');
            if (practiceTab) {
                practiceTab.click();
            }
            
            // Scroll ke canvas area
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                if (canvas) {
                    canvas.scrollIntoView({ behavior: 'smooth', block: 'center' });

            }, 300);

        function buildCharacterList() {
            allCharacters = [];

            const activeTabContent = document.getElementById(previousTab);
            if (activeTabContent) {
                const cards = activeTabContent.querySelectorAll('.character-card');
                cards.forEach(card => {
                    allCharacters.push({
                        char: card.dataset.char,
                        pinyin: card.dataset.pinyin,
                        meaning: card.dataset.meaning,
                        mnemonic: card.dataset.mnemonic
                    });
                });
            }

                                    🔊 Audio
                                </button>
                                <button class="practice-btn" onclick="goToPractice('${item.char}', '${item.pinyin}', '${item.meaning}', \`${item.mnemonic.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, event)" style="flex: 1;">
                                    ✍️ Latihan
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            });
            
            container.innerHTML = html;
        }
        
        renderWords();
        
        function showTab(tabName, buttonElement) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            if (buttonElement) buttonElement.classList.add('active');
        }
        
        function selectCharacter(char, pinyin, meaning, mnemonic) {
            currentChar = char;
            currentMnemonic = mnemonic;
            
            const isWord = char.length > 1;
            
            document.getElementById('bigCharDisplay').textContent = char;
            document.getElementById('bigCharDisplay').style.fontSize = isWord ? '4em' : '6em';
            document.getElementById('charInfo').textContent = `${pinyin} - ${meaning}`;
            document.getElementById('practiceMnemonic').innerHTML = `
                <div style="font-weight: bold; color: #ff6b6b; margin-bottom: 8px;">💡 Cara Mengingat:</div>
                <div style="color: #666;">${mnemonic}</div>
            `;
            document.getElementById('referenceChar').textContent = char;
            document.getElementById('referenceChar').style.fontSize = isWord ? '180px' : '280px';
            
            clearCanvas();
        }
        
        // Event listener untuk klik kartu - DIHAPUS
        // Sekarang hanya bisa ke latihan lewat tombol "✍️ Latihan"
        
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.character-card').forEach(card => {
                const char = card.dataset.char;
                const pinyin = card.dataset.pinyin.toLowerCase();
                const meaning = card.dataset.meaning.toLowerCase();
                const mnemonic = card.dataset.mnemonic.toLowerCase();
                card.style.display = (char.includes(term) || pinyin.includes(term) || 
                                     meaning.includes(term) || mnemonic.includes(term)) ? 'block' : 'none';
            });
        });
        
        // Canvas dengan state management yang lebih baik
        const canvas = document.getElementById('practiceCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let brushSize = 5;
        let brushColor = '#000000';
        
        // Set initial brush properties
        ctx.lineWidth = brushSize;
        ctx.strokeStyle = brushColor;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.strokeStyle = brushColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        });
        
        canvas.addEventListener('mouseup', () => { 
            isDrawing = false; 
            ctx.beginPath(); // Reset path untuk stroke berikutnya
        });
        
        canvas.addEventListener('mouseout', () => { 
            isDrawing = false;
            ctx.beginPath();
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.strokeStyle = brushColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        });
        
        canvas.addEventListener('touchend', () => { 
            isDrawing = false;
            ctx.beginPath();
        });
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        function toggleReference() {
            const ref = document.getElementById('referenceChar');
            ref.style.display = ref.style.display === 'none' ? 'block' : 'none';
        }
        
        function changeBrushSize(size) {
            brushSize = size;
            ctx.lineWidth = size;
            
            // Update visual feedback pada buttons
            const buttons = document.querySelectorAll('.controls button');
            buttons.forEach(btn => {
                if (btn.textContent.includes('Tipis') || 
                    btn.textContent.includes('Sedang') || 
                    btn.textContent.includes('Tebal')) {
                    btn.style.border = '2px solid transparent';
                }
            });
            
            // Highlight active button
            event.target.style.border = '2px solid #ffd700';
            event.target.style.boxShadow = '0 0 10px rgba(255, 215, 0, 0.5)';
        }
        
        function changeBrushSize(size) {
            brushSize = size;
            ctx.lineWidth = size;
            
            // Update visual feedback pada buttons
            document.getElementById('thinBtn').style.border = '2px solid transparent';
            document.getElementById('thinBtn').style.boxShadow = 'none';
            document.getElementById('mediumBtn').style.border = '2px solid transparent';
            document.getElementById('mediumBtn').style.boxShadow = 'none';
            document.getElementById('thickBtn').style.border = '2px solid transparent';
            document.getElementById('thickBtn').style.boxShadow = 'none';
            
            // Highlight active button
            if (size === 2) {
                document.getElementById('thinBtn').style.border = '2px solid #ffd700';
                document.getElementById('thinBtn').style.boxShadow = '0 0 10px rgba(255, 215, 0, 0.5)';
            } else if (size === 5) {
                document.getElementById('mediumBtn').style.border = '2px solid #ffd700';
                document.getElementById('mediumBtn').style.boxShadow = '0 0 10px rgba(255, 215, 0, 0.5)';
            } else if (size === 10) {
                document.getElementById('thickBtn').style.border = '2px solid #ffd700';
                document.getElementById('thickBtn').style.boxShadow = '0 0 10px rgba(255, 215, 0, 0.5)';
            }
            
            // Update preview
            updateBrushPreview();
        }
        
        function updateBrushPreview() {
            const previewCanvas = document.getElementById('brushPreview');
            if (!previewCanvas) return;
            
            const previewCtx = previewCanvas.getContext('2d');
            previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            
            // Draw three lines with different sizes
            const sizes = [2, 5, 10];
            const labels = ['Tipis (2px)', 'Sedang (5px)', 'Tebal (10px)'];
            const yPositions = [15, 30, 45];
            
            sizes.forEach((size, index) => {
                // Highlight current brush size
                if (size === brushSize) {
                    previewCtx.fillStyle = '#fff9e6';
                    previewCtx.fillRect(10, yPositions[index] - 8, 280, 16);
                }
                
                // Draw label
                previewCtx.fillStyle = size === brushSize ? '#667eea' : '#999';
                previewCtx.font = size === brushSize ? 'bold 11px Arial' : '11px Arial';
                previewCtx.textAlign = 'left';
                previewCtx.fillText(labels[index], 15, yPositions[index] + 4);
                
                // Draw line
                previewCtx.beginPath();
                previewCtx.moveTo(120, yPositions[index]);
                previewCtx.lineTo(280, yPositions[index]);
                previewCtx.strokeStyle = size === brushSize ? '#000' : '#666';
                previewCtx.lineWidth = size;
                previewCtx.lineCap = 'round';
                previewCtx.stroke();
            });
        }
        
        // Initialize preview
        setTimeout(() => {
            updateBrushPreview();
        }, 100);
        
        function evaluateWriting() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let hasDrawing = false;
            for (let i = 3; i < imageData.data.length; i += 4) {
                if (imageData.data[i] > 0) {
                    hasDrawing = true;
                    break;
                }
            }
            
            if (!hasDrawing) {
                alert('⚠️ Silakan tulis karakter terlebih dahulu!');
                return;
            }
            
            const score = Math.floor(Math.random() * 30) + 70;
            document.getElementById('totalScore').textContent = score;
            
            let stars = score >= 90 ? '⭐⭐⭐⭐⭐' : score >= 75 ? '⭐⭐⭐⭐' : 
                       score >= 60 ? '⭐⭐⭐' : '⭐⭐';
            document.getElementById('scoreStars').textContent = stars;
            
            let verdict = score >= 90 ? '🎉 Luar Biasa!' : score >= 75 ? '👍 Bagus Sekali!' : '😊 Cukup Baik!';
            document.getElementById('scoreVerdict').textContent = verdict;
            
            document.getElementById('evaluationPanel').classList.add('show');
            setTimeout(() => {
                document.getElementById('evaluationPanel').scrollIntoView({ 
                    behavior: 'smooth', block: 'center'
                });
            }, 300);
        }
        
        function closeEvaluation() {
            document.getElementById('evaluationPanel').classList.remove('show');
            clearCanvas();
        }
    </script>
</body>
</html>
